apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nodeimageset-controller
  namespace: system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: nodeimageset-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/component: nodeimageset-controller
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - command:
        - /nodeimageset-controller
        args:
          - --zap-log-level=debug
          - --host-dir=/etc/containerd/certs.d
        env:
          - name: NODE_NAME
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
        image: image-prefetch:dev
        imagePullPolicy: Never
        name: nodeimageset-controller
        volumeMounts:
        - name: containerd-sock
          mountPath: /run/containerd/containerd.sock
        - name: host-dir
          mountPath: /etc/containerd/certs.d
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      volumes:
        - name: containerd-sock
          hostPath:
            path: /run/containerd/containerd.sock
        - name: host-dir
          hostPath:
            path: /etc/containerd/certs.d
      serviceAccountName: controller-manager
      terminationGracePeriodSeconds: 10
      tolerations:
      - key: node-role.kubernetes.io/control-plane
        effect: NoSchedule
