name: "Main"
on:
  pull_request:
  push:
    branches:
    - 'main'
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - run: make build
      - run: make lint
      - run: make test
